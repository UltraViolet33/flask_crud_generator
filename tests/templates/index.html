<!DOCTYPE html>
<html>
<head>
    <title>{{ model_name }} List</title>
</head>
<body>
    <h1>{{ model_name }} List</h1>
    <ul>
        {% for item in items %}
            <a href="{{url_for(details_url, item_id=item.id)}}">details</a>
            {% for key, value in item.to_dict().items() %}
            <li>
                <p>{{value}}</p>
            </li>
            {% endfor %}
        {% endfor %}
    </ul>
</body>
</html>
